# ============================================================
# Hertie DSL Course Website — Configuration
# ============================================================
# Edit the fields below for your course.
# Do NOT change anything below the "Do not change" line.

# --- Course identity ---
course_name: "Example Course (EX101)"           # e.g. "Deep Learning (GRAD-E1394)"
course_description: "One paragraph description of the course."
course_semester: "Fall 2025"                # e.g. "Fall 2025" or "Spring 2026"
course_code: "EX101"                   # Hertie course code
github_org: "Hertie-School-Example-Course"  # GitHub org for this course

# --- Instructor / institution ---
schoolname: "Hertie School"
schoolurl: "https://hertie-school.org/en/datasciencelab"
dsl_org_url: "https://github.com/hertie-data-science-lab"
address: |
    Data Science Lab
    Hertie School
    Friedrichstraße 180
    10117 Berlin, Germany

# --- Optional ---
# twitter_username: hertie_dslab
# google_analytics: UA-XXXXXXXX-X

# --- Content repo (where course materials live) ---
content_repo: "https://github.com/Hertie-School-Example-Course/content-f2025"

### Do not change the following unless you know what you are doing ###

baseurl: ""
url: ""

markdown: kramdown
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop', 'hertie-config.yml']

dateformat: "%m/%d/%Y"
future: true

collections:
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false

defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"